<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support — TapCoin Empire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Inter:wght@400;500;600&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12211A;
    --gold: #E3B341;
    --gold-bright: #F5D67A;
    --gold-dim: #B4924C;
    --cream: #F2EFE6;
    --text-dim: #92A69A;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: #D3DBD3;
    font-family: 'Inter', -apple-system, sans-serif;
    line-height: 1.7;
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    text-align: center;
  }
  a { color: var(--gold); }
  .back {
    display: inline-block;
    margin-bottom: 32px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 32px;
    color: var(--cream);
  }
  p { font-size: 15px; margin: 16px 0; color: #D3DBD3; }
  .email-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 30px;
    background: var(--gold);
    color: #1B1300;
    font-weight: 700;
    font-size: 15px;
    border-radius: 10px;
    text-decoration: none;
  }
  .email-btn:focus-visible { outline: 3px solid var(--gold-bright); outline-offset: 3px; }
  .email-text { margin-top: 28px; font-size: 13px; color: var(--text-dim); font-family: 'Space Mono', monospace; }
  .footer-links {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid #2A4033;
  }
  .footer-links a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    margin: 0 10px;
  }
  .footer-links a:hover { color: var(--gold-bright); }
</style>
</head>
<body>
  <a href="index.html" class="back">← TapCoin Empire</a>
  <h1>Support</h1>
  <p>Running into an issue with TapCoin Empire, or just want to say hi? We'd love to hear from you.</p>
  <a href="mailto:youremail@gmail.com" class="email-btn">Email Us</a>
  <p class="email-text">youremail@gmail.com</p>

  <div class="footer-links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
  </div>
</body>
</html>
